version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brasilprev-demo-db
    environment:
      POSTGRES_DB: brasilprev_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d brasilprev_demo"]
      interval: 5s
      timeout: 5s
      retries: 5
